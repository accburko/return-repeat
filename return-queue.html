<!doctype html>
<html lang="pl">
    <head>
        <meta charset="UTF-8" />

        <title>Zwroty</title>

        <link rel="stylesheet" href="css/return-queue.css" />
        <link rel="stylesheet" href="css/repeat.css" />
    </head>

    <body>
        <div class="repeat-card">
            <div class="repeat-card-header">ZWROTY</div>

            <div class="repeat-order">
                <ul class="repeat-order-details">
                    <li class="repeat-order-date">05.7</li>

                    <li class="repeat-order-number">
                        <a
                            class="repeat-order-link"
                            id="orderNumber"
                            href="https://panel-e.baselinker.com/orders.php#order:149386991"
                        ></a>
                    </li>

                    <li class="repeat-order-customer" id="customerName">
                        Thomas Kriz ISI Kriz Samland GbR
                    </li>
                </ul>
                <div class="return-order-info">
                    <div class="return-reason" id="returnReason"></div>

                    <div class="return-shelf" id="returnShelf"></div>
                    <div class="return-decision">
                        <div id="decisionType" class="decision-type waiting">
                            🟡 Oczekiwanie
                        </div>

                        <div class="decision-note">
                            <textarea
                                id="decisionComment"
                                placeholder="Uwagi"
                            ></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="queue-products" id="productsSection">
                <div class="queue-product">
                    <div class="product-left">
                        <span class="queue-product-name">
                            <input type="checkbox" class="return-checkbox" />
                            <h3>OKRĄG</h3>
                        </span>

                        <div class="size">222.5 × 30</div>

                        <div class="mb">24 mb</div>
                    </div>

                    <div class="product-right">
                        <div>🩶 szary</div>
                        <div>💦 wodo</div>
                        <div>✔ stopery</div>
                    </div>
                </div>

                <hr />

                <div class="queue-product">
                    <div class="product-left">
                        <span class="queue-product-name">
                            <input type="checkbox" class="return-checkbox" />
                            <h3>BOX</h3>
                        </span>
                        <div class="size">57.5 × 42.5 × 160</div>

                        <div class="mb">23 mb</div>
                    </div>

                    <div class="product-right">
                        <div>🩶 szary</div>
                        <div>💦 wodo</div>
                        <div>🔒 zamek poj.</div>
                    </div>
                </div>
            </div>

            <div class="return-actions">
                <div id="repairPanel" class="repair-panel">
                    <label for="repairComment">
                        Powód naprawy <span class="required">*</span>
                    </label>

                    <textarea id="repairComment" rows="5"></textarea>

                    <button
                        id="finishRepairButton"
                        class="finish-repair-button"
                        disabled
                    >
                        UTWÓRZ ZLECENIE NAPRAWY
                    </button>
                </div>
                <div class="return-actions-grid">
                    <button class="action-card" id="repeatCard">
                        <span>🔁</span>
                    </button>

                    <button class="action-card" id="repairCard">
                        <span>🪡</span>
                    </button>

                    <button class="action-card" id="shippingCard">
                        <span>📦</span>
                    </button>

                    <button class="action-card" id="disposeCard">
                        <span>🗑</span>
                    </button>
                </div>
            </div>
        </div>
        <div id="repairModal" class="modal">
            <div class="modal-content">
                <h2>✔ Zlecenie naprawy utworzone</h2>
                <p>Komentarz został zapisany.</p>

                <p>Zamówienie zostało przekazane do naprawy</p>
                <div class="modal-buttons">
                    <button id="closeRepairModal">Zamknij</button>
                </div>
            </div>
        </div>
        <script src="js/return-queue.js"></script>
    </body>
</html>
